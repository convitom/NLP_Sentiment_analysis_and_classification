data:
  data_dir: data/
  max_length: 128
  num_emotions: 27
  neutral_label_idx: 27
  seed: 42
model:
  name: electra
  dropout: 0.1
training:
  epochs: 10
  batch_size: 32
  lr: 2.0e-05
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine_warmup
  warmup_ratio: 0.1
  step_size: 3
  gamma: 0.1
  early_stopping_patience: 3
  threshold: 0.5
  loss: asymmetric
  focal_gamma: 2.0
  asl_gamma_pos: 0.0
  asl_gamma_neg: 4.0
  asl_clip: 0.05
  pos_weight: null
results:
  base_dir: results/
